		  console.log('kkk');

	x.forEach((c,i)=>{d+=('0000000'+c.toString(2)).slice(-8)});
	let v='';
	for (let i=0;i<4;i++){v+=alef[parseInt(d.slice(i*6,i*6+6),2)]}
	return v
	}

/*✂
вот файл гиф который разжимается в 257 байт, при том что картинка 16х16....✂
как сука как это принять✂
R0lGODlhEAAQAKIAAD8Kj1/b3W/DziuCfBDBpAAAAAAAAAAAACH/C05FVFNDQVBFMi4wAwEAAAAh+QQEewABACwAAAAAEAAQAAADOwi63C0hyuGAvNLhIKhwn0JQlRIAAjQMoXZBWbNdbkAsdoURUMtABM6C1BgEWIRbSQFbMow0JyonlSYAADs=✂

let byts=[];
let biting;
let ish;
let kodend;
let kodclr;
let cur, bok, izo, dln;
let pic=new Array(16*16).fill(0);

function delo(){ // разжатие LZW
	byts=[];
	txt=king.value;
	pis=txt.split(/(....)/).filter(c=>c);// рубим на четыребуквенные64 слова

	for (let s of pis){
		//console.log(s);✂
		let a=[0,0,0];
			a=trux(s);
			byts.push(a[0]);byts.push(a[1]);byts.push(a[2]);
		}

	/*✂
	//******************************✂
	// длина заголовка 13 байт✂
	*/      

	biting=1+(byts[10]&7);//0xFE&7  1<<2
	if (biting<2) biting=2;// монохром учтен

	ish=13+3*(1 << biting);//на следующий блок вперед
	/*✂
	*/     
	kodend=(1 << biting)+1;
	kodclr=1 << biting;
	pot.setAttribute('max',kodclr-1);
	//pot.style.height=	+zyk.offsetHeight+'px';✂
	//console.log('код очистки=',1 << biting);// код очистки✂
	//console.log('код конца=',(1 << biting)+1);// код конца✂    

	cur=ish;

	bok=hex(byts[cur]);
	//console.log('блок после палитры=',bok,ish);// ✂

	cur+=2;//
	bok=hex(byts[cur]);
	//console.log('подблок длиной =',bok,cur);//✂

	while (bok!='00'){
		cur+=(byts[cur]+1);
		bok=hex(byts[cur]);
		//console.log('подблок длиной =',bok,cur);//✂
		}
	cur++;
	bok=hex(byts[cur]);
	//console.log('далее блок =',bok,cur);//	  ✂
	cur+=2;//
	bok=hex(byts[cur]);
	//console.log('подблок длиной =',bok,cur);//✂
	while (bok!='00'){
		cur+=(byts[cur]+1);
		bok=hex(byts[cur]);
		//console.log('подблок длиной =',bok,cur);//✂
		}
	//***********
	cur++;
	bok=byts[cur].toString(16).padStart(2, '0');
	//console.log('еще далее блок изобр=',bok,cur);//✂
	cur+=11;//

	izo=cur+1;//начало картинки

	bok=byts[cur].toString(16).padStart(2, '0');

	dln=byts[cur];//длина картинки

	//console.log('подблок длиной =',bok,cur);//✂
	while (bok!='00'){
		cur+=(byts[cur]+1);
		bok=byts[cur].toString(16).padStart(2, '0');
		//console.log('подблок длиной =',bok,cur);//✂
		}

	//********************✂

	cur++;
	bok=byts[cur].toString(16).padStart(2, '0');
	//console.log('и наконец блок =',bok,cur);//✂	

	//******************✂
	{
	console.log('изображение сжатое LZW:');
	let s=[];
	for(let i=0;i<dln;i++){
		s.push(byts[izo+i]);
		if(i&&!i%16){
			console.log(
			s.map(c=>hex(c)).join(' '),
			);
			s=[];
			}
		}
	if(s.length){
		console.log(
		s.map(c=>hex(c)).join(' '),
		);
		}
	}
	//***********✂		
	//console.log([bin(byts[izo]),bin(byts[izo+1]),bin(byts[izo+2]),bin(byts[izo+3]),].join(' '));✂
	//**********✂



	{
	let num=0;
	//[];✂
	const getfirstbyte=x=>{
	//console.log(num, x);✂
	return (x<kodclr)?
	x:
	getfirstbyte(r44[x].indx);}

	const outbytes=x=>{
		//console.log([num,x].join('='));✂
		//if(num>pic.length-1){✂
		//	alert('alert '+num+' '+(pic.length-1))}✂
		if(x<kodclr){pic[num]=x;num++}else{outbytes(r44[x].indx);pic[num]=r44[x].x;num++}
		}

	let readed=0;
	let code=0;
	let sizebit=biting;
	const r44 = new Array(0x1001).fill(null).map(() => ({indx:0,x:0}));// ии помог
	let h=0,H;
	let sizedic=0;
	function deka(x){
		for(let d=0;d<8;d++){
			if ((x >> d)%2) code=code | (1<<readed);
			readed++;
			if(readed>sizebit){
			//*****************✂
				r44[h+kodend+1].indx=code;
				r44[h+kodend].x=getfirstbyte(r44[h+kodend+1].indx);
				if((code!=kodclr)&&(code!=kodend)){
					h++;
					outbytes(code);
					}
					else
					{
					if (code==kodclr){
						if(sizedic<(h+kodend+1)) sizedic=h+kodend+1;
						h=0;
						sizebit=biting;
						}
					}
				//console.log(bin(code));✂
				code=0;
				readed=0;
			H=h+kodend;  // рост разрядности
			if ((!((H-1)&H))&&(H>7)) sizebit++;			
			//*****************
				}
			}
		}

	for (let i=0;i<dln;i++){// lzw дешифровка
		deka(byts[izo+i]);
		}
		}

	//console.log(pic.join(''));✂
	//console.log(`[[[${pic.length}]]]`);✂
	}//delo	end

		]);
	delo();// разжатие LZW
}
